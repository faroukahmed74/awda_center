<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Awda Center - مركز عَودة">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Awda Center">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon (uses same logo as app) -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>Awda Center</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;">
    <div style="width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#2E7D32;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
